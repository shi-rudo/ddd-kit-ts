name: Deploy Docs

# Deployment disabled 2026-05-23. A docs site operated from Germany
# requires a legal-notice page (Germany's TMG §5) and a privacy notice
# (GDPR Art. 13) once it is publicly reachable. Until those are in
# place, the site stays offline; the docs source remains in the repo
# and works locally via `pnpm docs:dev`.
#
# To re-enable:
#  1. Add docs/legal/legal-notice.md and docs/legal/privacy.md, then
#     link them from .vitepress/config.ts (themeConfig.footer + sidebar).
#  2. Re-enable GitHub Pages in repo Settings → Pages → Source:
#     "GitHub Actions".
#  3. Restore the `push:` trigger below (uncomment the lines).

on:
  # push:
  #   branches: [main]

  # Manual-only trigger with an explicit acknowledgement gate so the
  # build job cannot run without a human confirming the legal pages
  # are in place. The deployment will fail anyway while Pages is
  # disabled in repo settings, but this guard prevents accidental
  # uploads in case Pages gets re-enabled before the pages exist.
  workflow_dispatch:
    inputs:
      legal_pages_in_place:
        description: "Confirm that legal-notice.md and privacy.md are published in the docs."
        required: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Force GitHub-Actions's JS runtime (the host running each action's
  # script) onto Node 24 ahead of the June 2026 forced-default. Separate
  # from the in-job Node version below.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    if: ${{ inputs.legal_pages_in_place == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          # Node 24 is current LTS as of May 2026. The library itself
          # has no Node-version dependency (es2022 target, Web Crypto),
          # so we just run the toolchain on the latest LTS.
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
