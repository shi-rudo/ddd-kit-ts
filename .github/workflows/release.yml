name: Release package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify release tag
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi

      - name: Verify tag commit belongs to main
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: "10.32.1"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run

      - name: Build
        run: pnpm build

      - name: Package smoke
        run: |
          base_error_version=$(node -p "require('./node_modules/@shirudo/base-error/package.json').version")
          result_version=$(node -p "require('./node_modules/@shirudo/result/package.json').version")
          rm -rf /tmp/pack-smoke /tmp/pack-consumer
          mkdir -p /tmp/pack-smoke /tmp/pack-consumer
          pnpm pack --pack-destination /tmp/pack-smoke
          tarball=$(printf '%s\n' /tmp/pack-smoke/shirudo-ddd-kit-*.tgz)
          mv -f "$tarball" /tmp/pack-smoke/package.tgz
          tarball=/tmp/pack-smoke/package.tgz
          cd /tmp/pack-consumer
          npm init -y >/dev/null
          npm install --ignore-scripts --no-audit --no-fund "$tarball" "@shirudo/base-error@$base_error_version" "@shirudo/result@$result_version"
          node --input-type=module -e "const m = await import('@shirudo/ddd-kit'); if (typeof m.AggregateRoot !== 'function') throw new Error('main import smoke failed');"
          node --input-type=module -e "const m = await import('@shirudo/ddd-kit/money'); if (typeof m.parseMoneyInput !== 'function') throw new Error('money import smoke failed');"

      - name: Upload verified package
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: /tmp/pack-smoke/package.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download verified package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: release

      - name: Install trusted-publishing npm CLI
        run: npm install --global --ignore-scripts npm@12.0.1

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version=$(tar -xOf ./release/package.tgz package/package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          else
            dist_tag="latest"
          fi
          echo "dist-tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish ./release/package.tgz --ignore-scripts --provenance --access public --tag "${{ steps.release.outputs.dist-tag }}"
