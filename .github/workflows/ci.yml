name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run

      - name: Build
        run: pnpm build

      - name: Package smoke (pack + import from the tarball)
        run: |
          pnpm pack --pack-destination /tmp/pack-smoke
          cd /tmp/pack-smoke
          tar -xzf shirudo-ddd-kit-*.tgz
          cd package
          node --input-type=module -e "const m = await import('./dist/index.js'); if (typeof m.AggregateRoot !== 'function') throw new Error('import smoke failed');"
          node --input-type=module -e "const m = await import('./dist/money.js'); if (typeof m.parseMoneyInput !== 'function') throw new Error('money entry smoke failed');"
