name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Production dependency audit
        if: matrix.node-version == 22
        run: pnpm audit:prod

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package smoke (pack + import from the tarball)
        run: |
          base_error_version=$(node -p "require('./node_modules/@shirudo/base-error/package.json').version")
          result_version=$(node -p "require('./node_modules/@shirudo/result/package.json').version")
          rm -rf /tmp/pack-smoke /tmp/pack-consumer
          mkdir -p /tmp/pack-smoke /tmp/pack-consumer
          pnpm pack --pack-destination /tmp/pack-smoke
          tarball=$(printf '%s\n' /tmp/pack-smoke/shirudo-ddd-kit-*.tgz)
          cd /tmp/pack-consumer
          npm init -y
          npm install --ignore-scripts --no-audit --no-fund "$tarball" "@shirudo/base-error@$base_error_version" "@shirudo/result@$result_version" typescript@5.9.3
          cp -f "$GITHUB_WORKSPACE/scripts/package-smoke/consumer.mts" .
          npx tsc consumer.mts --strict --skipLibCheck false --target ES2022 --module NodeNext --moduleResolution NodeNext --outDir dist
          node dist/consumer.mjs

  edge-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Built package in edge runtimes
        run: pnpm test:edge-runtime
