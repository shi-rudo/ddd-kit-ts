allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

overrides:
  qs: 6.15.2
  # Vite+ publishes its core under the conventional Vite package name and
  # bundles the matching Vitest release. Keep every transitive peer on that
  # single toolchain instance, as required by the Vite+ pnpm migration.
  vite: "catalog:"
  vitest: "catalog:"

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
  vitest: 4.1.10

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
